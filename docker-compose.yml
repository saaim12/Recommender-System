version: "3.9"

services:
  api:
    build: .
    container_name: recommender-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: recommender-redis
    ports:
      - "6379:6379"
